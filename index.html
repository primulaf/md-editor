<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>md.</title>
  <meta name="description" content="GitHub 风格离线 Markdown 编辑器 — 实时预览、目录导航、图片粘贴、HTML 导出">
  <meta name="author" content="md.">

  <!-- highlight.js 代码高亮主题（app.js 会动态切换这个链接） -->
  <link
    id="hljs-theme"
    rel="stylesheet"
    href="./lib/github.min.css"
  />

  <!-- 自定义样式 -->
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- 跳过导航链接（仅对键盘和屏幕阅读器可见） -->
  <a href="#editor" class="skip-link visually-hidden">跳到编辑区</a>
  
  <div class="app">
    <!-- 左侧边栏 -->
    <aside class="sidebar" role="complementary" aria-label="工具面板">
      <div class="brand">
        <h1>md.</h1>
        <p>编辑 &middot; 预览 &middot; 导出</p>
      </div>

      <div class="toolbar">
        <button id="openBtn" type="button">打开 .md</button>
        <button id="saveBtn" type="button" class="primary">保存 .md</button>
        <button id="exportHtmlBtn" type="button">导出 HTML</button>
        <button id="fontSizeBtn" type="button">字号：小</button>
        <button id="newBtn" type="button">新建</button>
      </div>

      <div class="toc-panel">
        <div class="panel-title">目录</div>
        <nav id="toc" class="toc">
          <div class="toc-empty">当前文档还没有标题</div>
        </nav>
      </div>

      <div class="stats-panel">
        <div class="panel-title">统计信息</div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-label">总字数</div>
            <div id="statChars" class="stat-value">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">行数</div>
            <div id="statLines" class="stat-value">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">标题数</div>
            <div id="statHeadings" class="stat-value">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">阅读时间</div>
            <div id="statReadTime" class="stat-value">0 分钟</div>
          </div>
        </div>
      </div>

      <div class="tips">
        <div class="panel-title">功能</div>
        <ul>
          <li>实时预览 &amp; 同步滚动</li>
          <li>GitHub 风格白底阅读</li>
          <li>HTML 导出</li>
          <li>图片拖拽 / 粘贴</li>
          <li>文档统计</li>
          <li>目录自动生成</li>
        </ul>
      </div>
    </aside>

    <!-- 中间编辑区 -->
    <main class="editor-pane">
      <div class="pane-header">
        <button id="sidebarToggle" class="pane-btn" type="button">侧栏</button>
        <span class="pane-title">编辑区</span>
        <div class="pane-header-right">
          <span id="fileName" class="muted">未命名文档.md</span>
          <button id="closeEditorBtn" class="pane-btn pane-close-btn" type="button" title="隐藏编辑区">×</button>
        </div>
      </div>

      <div class="editor-toolbar">
        <span class="hint">^S 保存 &nbsp; ^E 导出 HTML &nbsp; ^O 打开文件</span>
        <span class="hint">拖拽或粘贴图片到编辑区</span>
      </div>

      <textarea id="editor" spellcheck="false"></textarea>

      <div class="pane-restore-wrap">
        <button class="pane-restore" data-restore="editor" type="button">显示编辑区</button>
      </div>

      <input
        type="file"
        id="fileInput"
        accept=".md,.markdown,text/markdown,text/plain"
        hidden
      />
    </main>

    <!-- 分栏拖拽手柄 -->
    <div id="resizeHandle" class="resize-handle"></div>

    <!-- 右侧预览区 -->
    <section class="preview-pane">
      <div class="pane-header">
        <button id="previewSidebarToggle" class="pane-btn" type="button">侧栏</button>
        <span class="pane-title">预览区</span>
        <div class="pane-header-right">
          <span id="status" class="muted">已就绪</span>
          <button id="closePreviewBtn" class="pane-btn pane-close-btn" type="button" title="隐藏预览区">×</button>
        </div>
      </div>
      <div id="preview" class="preview markdown-body"></div>
      <div class="pane-restore-wrap">
        <button class="pane-restore" data-restore="preview" type="button">显示预览区</button>
      </div>
    </section>
  </div>

  <!-- 第三方库：顺序不要乱 -->
  <script src="./lib/markdown-it.min.js"></script>
  <script src="./lib/markdownItAnchor.umd.js"></script>
  <script src="./lib/purify.min.js"></script>
  <script src="./lib/highlight.min.js"></script>

  <!-- 文件名输入对话框 -->
  <div id="filenameDialog" class="filename-dialog" role="dialog" aria-modal="true" aria-labelledby="filenameDialogTitle" hidden>
    <div class="filename-dialog-content">
      <h3 id="filenameDialogTitle" class="filename-dialog-title">输入文件名</h3>
      <div class="filename-dialog-body">
        <label for="filenameInput">文件名：</label>
        <input type="text" id="filenameInput" class="filename-input" placeholder="例如：我的文档.md" />
        <div class="filename-hint">提示：确保包含正确的扩展名（.md 或 .html）</div>
      </div>
      <div class="filename-dialog-actions">
        <button type="button" id="filenameCancelBtn" class="filename-btn">取消</button>
        <button type="button" id="filenameConfirmBtn" class="filename-btn primary">确定</button>
      </div>
    </div>
  </div>

  <!-- 业务逻辑 -->
  <script src="./app.js"></script>
</body>
</html>
